body:
  text: 後漢安息國三藏安世高譯聞如是一時佛遊於舍衛祇樹給孤獨園佛告諸比丘比丘受教從佛而聽佛言諸比丘若以彈指間思惟死想念有身皆死是為精進行禪為如佛教不是愚癡食國人施也何況多行者取要言之若念不淨想穢食想一切世間無有樂想無常想無常為苦想苦為非身想非身為空想棄離想却淫想滅盡想無我想身死為蟲食想血流想膖脹想青腐想糜爛腥臭想髮落肉盡想一切縛解想骨節分散想骨變赤白枯黑亦如鳩色想骨糜為灰想世間無所歸想世間無牢固想世間為別離想世間暗冥想世間難忍想世為費耗不中用想世為災變可患厭想一切世間歸泥洹想諸比丘若以彈指間念此諸想之事皆為精進行為奉佛教不是愚癡食人施也何況能多行是故可念行法想佛説是已皆歡喜受
